---
# git: GitHub CLI (gh), git-lfs, pre-commit, ghq, gh-copilot

# ── GitHub CLI (gh) ──

- name: GitHub CLI がインストール済みか確認
  ansible.builtin.command: gh --version
  register: gh_check
  changed_when: false
  failed_when: false

- name: GitHub CLI をインストール
  when: gh_check.rc != 0
  block:
    - name: GitHub CLI の GPG 鍵を追加
      become: true
      ansible.builtin.shell: |
        wget -nv -O /tmp/githubcli-archive-keyring.gpg https://cli.github.com/packages/githubcli-archive-keyring.gpg
        install -o root -g root -m 644 /tmp/githubcli-archive-keyring.gpg /etc/apt/keyrings/githubcli-archive-keyring.gpg
        rm -f /tmp/githubcli-archive-keyring.gpg
      args:
        creates: /etc/apt/keyrings/githubcli-archive-keyring.gpg

    - name: GitHub CLI の apt リポジトリを追加
      become: true
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        filename: github-cli
        state: present

    - name: GitHub CLI をインストール (apt)
      become: true
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true

# ── git-lfs ──

- name: git-lfs をインストール
  become: true
  ansible.builtin.apt:
    name: git-lfs
    state: present

- name: git-lfs をシステム全体で有効化
  become: true
  ansible.builtin.command: git lfs install --system
  register: git_lfs_install
  changed_when: "'already initialized' not in git_lfs_install.stderr"
  failed_when: false

# ── pre-commit ──

- name: pre-commit がインストール済みか確認
  ansible.builtin.command: pre-commit --version
  register: precommit_check
  changed_when: false
  failed_when: false

- name: pre-commit をインストール (pipx)
  community.general.pipx:
    name: pre-commit
  when: precommit_check.rc != 0

# ── ghq ──

- name: ghq がインストール済みか確認
  ansible.builtin.command: ghq --version
  register: ghq_check
  changed_when: false
  failed_when: false

- name: ghq をインストール
  when: ghq_check.rc != 0
  block:
    - name: ghq の最新バージョンを取得
      ansible.builtin.uri:
        url: https://api.github.com/repos/x-motemen/ghq/releases/latest
        return_content: true
      register: ghq_latest

    - name: ghq のバージョンを決定
      ansible.builtin.set_fact:
        ghq_version: "{{ ghq_latest.json.tag_name | regex_replace('^v', '') }}"

    - name: ghq をダウンロード
      ansible.builtin.get_url:
        url: "https://github.com/x-motemen/ghq/releases/download/v{{ ghq_version }}/ghq_linux_amd64.zip"
        dest: /tmp/ghq.zip
        mode: "0644"

    - name: ghq を展開
      ansible.builtin.unarchive:
        src: /tmp/ghq.zip
        dest: /tmp/
        remote_src: true

    - name: ghq を /usr/local/bin に配置
      become: true
      ansible.builtin.copy:
        src: /tmp/ghq_linux_amd64/ghq
        dest: /usr/local/bin/ghq
        mode: "0755"
        remote_src: true

    - name: ghq ダウンロードファイルを削除
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/ghq.zip
        - /tmp/ghq_linux_amd64

# ── GitHub Copilot CLI (gh extension) ──

- name: gh-copilot 拡張がインストール済みか確認
  ansible.builtin.shell: gh extension list 2>/dev/null | grep -q copilot
  register: copilot_check
  changed_when: false
  failed_when: false

- name: gh-copilot 拡張をインストール
  ansible.builtin.command: gh extension install github/gh-copilot
  register: copilot_install
  changed_when: copilot_install.rc == 0
  failed_when: false
  when: copilot_check.rc != 0
